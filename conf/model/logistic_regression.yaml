defaults:
  - /search_space: logistic_regression

_target_: sklearn.linear_model.LogisticRegression

# --- core ---
l1_ratio: 0   # 0 is l2 penalty, 1 is l1 penalty, and anything between 0,1 is elasticnet, and c=np.inf is no penalty
C: 1.0
solver: lbfgs
max_iter: 1000
warm_start: False

# --- imbalance handling ---
class_weight: balanced

random_state: ${seed}
